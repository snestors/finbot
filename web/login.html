<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FinBot - Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
  <style>
    body { display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    .login-box {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 48px 40px;
      width: 360px;
      text-align: center;
      position: relative;
      overflow: hidden;
    }
    .login-box::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--cyan), var(--magenta), transparent);
    }
    .login-box h1 {
      font-family: 'Orbitron', sans-serif;
      font-size: 2rem;
      background: linear-gradient(135deg, var(--cyan), var(--magenta));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 8px;
    }
    .login-box .subtitle {
      color: var(--muted);
      font-size: 0.85rem;
      margin-bottom: 32px;
    }
    .pin-input {
      width: 100%;
      padding: 14px 16px;
      font-size: 1.5rem;
      text-align: center;
      letter-spacing: 12px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--cyan);
      font-family: 'Share Tech Mono', monospace;
      outline: none;
      transition: border-color 0.3s;
    }
    .pin-input:focus { border-color: var(--cyan); box-shadow: 0 0 20px rgba(0,240,255,0.15); }
    .pin-input.error { border-color: var(--magenta); animation: shake 0.4s; }
    .login-btn {
      width: 100%;
      margin-top: 20px;
      padding: 14px;
      font-family: 'Orbitron', sans-serif;
      font-size: 0.95rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 2px;
      background: linear-gradient(135deg, var(--cyan), #0088aa);
      color: var(--bg);
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.3s;
    }
    .login-btn:hover { box-shadow: 0 0 30px rgba(0,240,255,0.3); transform: translateY(-1px); }
    .login-btn:disabled { opacity: 0.5; cursor: wait; }
    .error-msg { color: var(--magenta); font-size: 0.85rem; margin-top: 12px; min-height: 20px; }
    @keyframes shake {
      0%,100%{transform:translateX(0)} 25%{transform:translateX(-8px)} 75%{transform:translateX(8px)}
    }
  </style>
</head>
<body>
  <div class="login-box">
    <h1>FINBOT</h1>
    <p class="subtitle">Agente Financiero Personal</p>
    <form id="login-form">
      <input type="password" id="pin" class="pin-input" placeholder="----" maxlength="8" autocomplete="off" autofocus>
      <button type="submit" class="login-btn" id="login-btn">Ingresar</button>
    </form>
    <div class="error-msg" id="error-msg"></div>
  </div>
  <script src="/js/auth.js"></script>
</body>
</html>
